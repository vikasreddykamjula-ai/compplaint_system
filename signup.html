<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Online Complaint System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="logo">📝 Complaint Portal</div>
        <nav class="navbar">
            <ul id="main-nav-list">
                <li><a href="home.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li id="nav-raise-complaint" class="hidden"><a href="userdashboard.html">Raise Complaint</a></li>
                <li id="nav-user-dashboard" class="hidden"><a href="userdashboard.html">User Dashboard</a></li>
                <li id="nav-admin-dashboard" class="hidden"><a href="Admindashboard.html">Admin Dashboard</a></li>
                <li id="nav-login"><a href="login.html">Student Login</a></li>
                <li id="nav-admin-login"><a href="adminlogin.html">Admin Login</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="container">
            <section>
                <h2>User Sign Up</h2>
                <form id="signup-form" autocomplete="off">
                    <input type="text" id="user-id" name="user-id" placeholder="User ID (auto-generated)" readonly>
                    <input type="text" id="fullname" name="fullname" placeholder="Full Name" required>
                    <input type="number" id="age" name="age" placeholder="Age" min="1" required>
                    <input type="text" id="address" name="address" placeholder="Address" required>
                    <input type="email" id="email" name="email" placeholder="Email" required>
                    <input type="tel" id="mobile" name="mobile" placeholder="Mobile Number" pattern="[0-9]{10}" required>
                    <input type="password" id="password" name="password" placeholder="Password" required>
                    <div class="password-field">
                        <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm Password" required>
                        <button type="button" id="toggle-password" class="password-toggle">Show</button>
                    </div>
                    <button type="submit">Sign Up</button>
                </form>
                <div class="complaint-success hidden" id="signup-success">✅ Signup successful! Redirecting to login...</div>
            </section>
        </div>
    </main>
    <footer class="main-footer">
        <span>© 2026 Online Complaint System. All rights reserved.</span>
        <nav class="footer-nav">
            <a href="home.html">Home</a> |
            <a href="about.html">About</a> |
            <a href="login.html">Student Login</a> |
            <a href="adminlogin.html">Admin Login</a>
        </nav>
    </footer>

    <script>
    // Configuration: Update this URL after deploying to Render
    const API_URL = "https://complaint-backend-w3i7.onrender.com"; 

    // Auto-generate user ID
    function generateUserID() {
        document.getElementById('user-id').value = 'U' + Math.floor(100000 + Math.random() * 900000);
    }
    generateUserID();

    // Password toggle
    const toggleBtn = document.getElementById('toggle-password');
    const confirmPwd = document.getElementById('confirm-password');
    toggleBtn.addEventListener('click', function() {
        if (confirmPwd.type === 'password') {
            confirmPwd.type = 'text';
            toggleBtn.textContent = 'Hide';
        } else {
            confirmPwd.type = 'password';
            toggleBtn.textContent = 'Show';
        }
    });

    // Signup form submission to Backend
    document.getElementById('signup-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const pwd = document.getElementById('password').value;
        const cpwd = document.getElementById('confirm-password').value;
        
        if (pwd !== cpwd) {
            alert('Passwords do not match!');
            return;
        }

        // Prepare data matching the Pydantic model in main.py
        const userData = {
            username: document.getElementById('user-id').value,
            fullname: document.getElementById('fullname').value,
            age: parseInt(document.getElementById('age').value),
            address: document.getElementById('address').value,
            email: document.getElementById('email').value,
            mobile: document.getElementById('mobile').value,
            password: pwd
        };

        try {
            const response = await fetch(`https://complaint-backend-w3i7.onrender.com/signup`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(userData)
            });

            const result = await response.json();

            if (response.ok) {
                document.getElementById('signup-success').classList.remove('hidden');
                setTimeout(function() {
                    window.location.href = "login.html"; 
                }, 2000);
            } else {
                alert("Signup failed: " + (result.detail || "Unknown error"));
            }
        } catch (error) {
            console.error("Error connecting to backend:", error);
            alert("Connection error: Is the FastAPI server running?");
        }
    });

    // Navigation logic
    function updateNavLinks() {
        const isStudent = localStorage.getItem('current_user_id');
        const isAdmin = localStorage.getItem('is_admin');
        document.getElementById('nav-raise-complaint').classList.toggle('hidden', !isStudent);
        document.getElementById('nav-user-dashboard').classList.toggle('hidden', !isStudent);
        document.getElementById('nav-login').classList.toggle('hidden', !!isStudent);
        document.getElementById('nav-admin-login').classList.toggle('hidden', !!isStudent || !!isAdmin);
        document.getElementById('nav-admin-dashboard').classList.toggle('hidden', !isAdmin);
    }
    updateNavLinks();
    window.addEventListener('storage', updateNavLinks);
    </script>
</body>
</html>
