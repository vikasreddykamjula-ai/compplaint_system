<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - Online Complaint System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Modern Colorful Theme */
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
        }

        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        section {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            transition: transform 0.3s ease;
        }

        section:hover {
            transform: translateY(-5px);
        }

        h2 {
            color: #4b2c82;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2rem;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #764ba2;
        }

        /* Toggle Button Styling */
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #666;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #764ba2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s, box-shadow 0.3s;
        }

        button:hover {
            background: #5a378c;
            box-shadow: 0 5px 15px rgba(118, 75, 162, 0.4);
        }

        .signup-link {
            text-align: center;
            margin-top: 20px;
            color: #555;
        }

        .signup-link a {
            color: #764ba2;
            text-decoration: none;
            font-weight: bold;
        }

        .complaint-success {
            background: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 5px;
            margin-top: 15px;
            text-align: center;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <header class="main-header" style="background: rgba(0,0,0,0.2); backdrop-filter: blur(5px);">
        <div class="logo" style="color: white; padding: 15px;">📝 Complaint Portal</div>
        </header>

    <main class="container">
        <section>
            <h2>Student Login</h2>
            <form id="student-login-form">
                <div class="input-group">
                    <input type="text" id="student-username" placeholder="Student Username" required>
                </div>
                
                <div class="input-group">
                    <input type="password" id="student-password" placeholder="Password" required>
                    <i class="fa-solid fa-eye toggle-password" id="toggleBtn"></i>
                </div>

                <button type="submit">Login as Student</button>
            </form>

            <div class="signup-link">
                Don't have an account? <a href="signup.html">Sign up here</a>
            </div>

            <div class="complaint-success hidden" id="student-login-success">
                <i class="fa-solid fa-circle-check"></i> Login successful!
            </div>
        </section>
    </main>

    <script>
        // --- 1. Password Toggle Logic ---
        const toggleBtn = document.getElementById('toggleBtn');
        const passwordInput = document.getElementById('student-password');

        toggleBtn.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            // Toggle the icon
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });

        // --- 2. Existing Login Logic ---
        document.getElementById('student-login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = document.getElementById('student-username').value;
            const password = document.getElementById('student-password').value;
            
            try {
                const res = await fetch('http://127.0.0.1:8000/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem('current_user_id', data.id);
                    localStorage.setItem('user_fullname', data.fullname);
                    
                    document.getElementById('student-login-success').classList.remove('hidden');
                    setTimeout(() => {
                        window.location.href = 'userdashboard.html';
                    }, 1200);
                } else {
                    alert('Invalid credentials. Check your username/password.');
                }
            } catch (err) {
                alert('Connection error. Is your FastAPI server running?');
            }
        });
    </script>
</body>
</html>
